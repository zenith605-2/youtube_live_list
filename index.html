<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="site_title">YouTube Live Cams & Footage</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page-layout">
<nav id="sidebar" class="sidebar"></nav>
<div class="page-content">
<header class="site-header">
  <div class="header-actions">
    <select id="langSelect" class="lang-select">
      <option value="en">English</option>
      <option value="ja">日本語</option>
      <option value="ko">한국어</option>
      <option value="zh">中文</option>
      <option value="es">Español</option>
    </select>
    <button type="button" id="leaderboardBtn" class="auth-btn" data-i18n="leaderboard_button">🏆 Leaderboard</button>
    <div id="authArea" class="auth-area"></div>
  </div>
  <div id="quotaInfo" class="quota-info" hidden></div>
  <h1 data-i18n="site_h1">YouTube Live Cams & Footage</h1>
  <p class="subtitle" data-i18n="site_subtitle">A curated collection of live cams and real-world footage — traffic, wildlife, dashcams, city streets, and more, gathered from YouTube every day.</p>
  <div class="controls">
    <input type="text" id="searchInput" data-i18n-placeholder="search_placeholder" placeholder="Search by title or channel...">
    <span id="lastUpdated" class="last-updated"></span>
  </div>
  <div class="filter-bar">
    <select id="contentTypeFilter" hidden>
      <option value="" data-i18n="filter_all">All</option>
      <option value="live" data-i18n="content_type_live">Live</option>
      <option value="video" data-i18n="content_type_video">Video</option>
    </select>
    <select id="categoryFilter" hidden>
      <option value="">All</option>
    </select>
    <select id="countryFilter" hidden>
      <option value="" data-i18n="filter_all">All</option>
    </select>
    <select id="qualityFilter">
      <option value="" data-i18n="filter_all">All</option>
      <option value="hd2160">4K</option>
      <option value="hd1440">1440p</option>
      <option value="hd1080">1080p</option>
      <option value="hd720">720p</option>
      <option value="large">480p</option>
      <option value="medium">360p</option>
      <option value="small">240p</option>
      <option value="tiny">144p</option>
    </select>
    <select id="addedFilter">
      <option value="" data-i18n="filter_all">All</option>
      <option value="7" data-i18n="added_week">Past week</option>
      <option value="30" data-i18n="added_month">Past month</option>
    </select>
    <select id="statusFilter" hidden>
      <option value="live" data-i18n="status_live">Live</option>
      <option value="" data-i18n="filter_all">All</option>
      <option value="offline" data-i18n="status_offline">Offline</option>
    </select>
    <select id="visibilityFilter" hidden>
      <option value="listed" data-i18n="visibility_listed">Normal</option>
      <option value="" data-i18n="filter_all">All</option>
      <option value="hidden" data-i18n="visibility_hidden">Low-rated</option>
    </select>
    <label class="favorites-only-label" hidden>
      <input type="checkbox" id="favoritesOnlyCheckbox">
      <span data-i18n="favorites_only">⭐ My favorites</span>
    </label>
    <div class="view-toggle">
      <button type="button" id="gridViewBtn" class="view-btn" data-i18n="view_grid">▦ Grid</button>
      <button type="button" id="listViewBtn" class="view-btn" data-i18n="view_list">☰ List</button>
    </div>
  </div>
  <form id="submitForm" class="submit-form" hidden>
    <input type="text" id="submitUrl" data-i18n-placeholder="submit_placeholder" placeholder="Paste a YouTube live URL (e.g. https://www.youtube.com/watch?v=...)">
    <button type="submit" data-i18n="submit_button">Submit</button>
    <span id="submitStatus" class="submit-status"></span>
  </form>
</header>

<main id="grid" class="grid"></main>

<p id="emptyState" class="empty-state" data-i18n="empty_state" hidden>No results to display.</p>
</div>
</div>

<div id="modal" class="modal" hidden>
  <div class="modal-backdrop"></div>
  <div class="modal-content">
    <div class="modal-header">
      <span id="modalTitle" class="modal-title"></span>
      <a id="modalOpenNewTab" class="modal-open-new-tab" target="_blank" rel="noopener" data-i18n="watch_on_youtube">Watch on YouTube</a>
      <button id="modalClose" class="modal-close" aria-label="Close">&times;</button>
    </div>
    <div class="modal-url-row">
      <input type="text" id="modalUrlInput" class="modal-url-input" readonly>
      <button type="button" id="modalCopyBtn" class="modal-copy-btn" data-i18n="copy_url">Copy</button>
    </div>
    <div class="modal-player"></div>
  </div>
</div>

<div id="leaderboardModal" class="modal" hidden>
  <div class="modal-backdrop"></div>
  <div class="leaderboard-content">
    <div class="modal-header">
      <span class="modal-title" data-i18n="leaderboard_title">🏆 Leaderboard</span>
      <button type="button" id="leaderboardClose" class="modal-close" aria-label="Close">&times;</button>
    </div>
    <ol id="leaderboardList" class="leaderboard-list"></ol>
  </div>
</div>

<footer class="site-footer">
  <a href="privacy.html" data-i18n="privacy_policy">Privacy Policy</a>
  · <a href="admin.html">Admin</a>
</footer>

<script src="https://www.youtube.com/iframe_api"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/i18n.js"></script>
<script src="js/app.js"></script>
</body>
</html>
