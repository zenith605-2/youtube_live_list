name: Update CCTV live list

on:
  schedule:
    # 매일 UTC 15:07 = KST 00:07 (자정 직후) — 방문자 통계의 하루 경계(KST 자정)와 일치.
    # 정각은 전 세계 예약 작업이 몰려 2~3시간씩 지연되므로 한산한 분(7분)으로 등록.
    - cron: '7 15 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run update script
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/update.mjs

      # ---- AI 썸네일 카테고리 분류 (CLIP 제로샷, 행당 1회만 수행) ----
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-clip-${{ runner.os }}-v1

      - name: Cache CLIP model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-clip-vit-base-patch32-v1

      - name: Install Python dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install transformers pillow requests

      - name: Classify thumbnails with CLIP
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/classify_thumbnails.py

      # ---- AI 검수: 승인 대기 큐를 Gemini로 자동 판정 (GEMINI_API_KEY 없으면 스킵) ----
      - name: AI review pending queue
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/ai_review.mjs

      # ---- 국가/카테고리별 정적 SEO 페이지 재생성 후 변경분만 커밋 ----
      - name: Generate SEO pages
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/generate_pages.mjs

      - name: Commit generated pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add country c browse.html globe.html index.html sitemap.xml data/streams.json
          # 작업 도중 main에 새 커밋이 올라왔을 수 있으므로 rebase 후 푸시 (경합으로 인한 push 실패 방지)
          git diff --cached --quiet || (git commit -m "Regenerate SEO pages" && git pull --rebase origin main && git push)

      # ---- 매일 밤 DB 전체 백업 (텍스트 전용이라 용량이 작음) — 비공개 저장소(camlisted-backups)에 보관.
      # 무료 Supabase 티어엔 자동 백업이 없어서 직접 구현. 같은 파일(backup/latest.sql)을 매일 덮어써서
      # 커밋하므로, 그 비공개 저장소의 git 히스토리 자체가 "특정 날짜로 롤백" 역할을 한다 —
      # 날짜별 파일을 따로 관리할 필요가 없다. 두 시크릿이 없으면 조용히 건너뛴다.
      - name: Dump database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          # if: 에서 secrets 컨텍스트를 직접 못 써서 (GitHub Actions 파서가 거부함) 스크립트 안에서 체크한다.
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "SUPABASE_DB_URL 시크릿 없음 — 백업 건너뜀"
            exit 0
          fi
          # 러너에 미리 깔린 pg_dump 버전이 Supabase 서버 버전과 안 맞아 실패하는 걸 피하려고
          # postgres:17 공식 이미지 안의 pg_dump를 그대로 쓴다. pg_dump는 자기보다 최신 버전 서버는
          # 덤프를 거부하는데, 실제로 Supabase가 17.6을 쓰고 있는 걸 이번에 확인했다 (16으로 시도했다가
          # "server version mismatch"로 실패). 같은 메이저 버전이면 마이너 차이는 문제없다.
          docker run --rm postgres:17 pg_dump "$SUPABASE_DB_URL" --no-owner --no-privileges > db-backup.sql
          test -s db-backup.sql # 빈 파일이면 실패 처리 (깨진 백업을 조용히 커밋하지 않기 위해)

      - name: Push backup to private repo
        env:
          BACKUP_REPO_TOKEN: ${{ secrets.BACKUP_REPO_TOKEN }}
        run: |
          if [ -z "$BACKUP_REPO_TOKEN" ] || [ ! -s db-backup.sql ]; then
            echo "BACKUP_REPO_TOKEN 시크릿 또는 덤프 파일 없음 — 백업 건너뜀"
            exit 0
          fi
          git clone --depth 1 "https://x-access-token:${BACKUP_REPO_TOKEN}@github.com/zenith605-2/camlisted-backups.git" backup-repo
          mkdir -p backup-repo/backup
          mv db-backup.sql backup-repo/backup/latest.sql
          cd backup-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backup/latest.sql
          git diff --cached --quiet || git commit -m "Backup $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
